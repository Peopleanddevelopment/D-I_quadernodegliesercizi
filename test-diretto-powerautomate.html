<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test diretto Power Automate</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f7f4ef;color:#24211f;margin:0;padding:24px;line-height:1.45}
    main{max-width:760px;margin:0 auto;background:#fffdf9;border:1px solid #ded4c8;border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.06)}
    button{border:0;border-radius:999px;background:#34251c;color:#fff;padding:14px 18px;font-weight:700;cursor:pointer;margin:8px 8px 8px 0}
    pre{white-space:pre-wrap;background:#f0e8dd;border-radius:12px;padding:14px;overflow:auto}
    .ok{color:#12613b;font-weight:700}.warn{color:#8a4b00;font-weight:700}
  </style>
</head>
<body>
<main>
  <h1>Test diretto Power Automate</h1>
  <p>Questo file serve solo per capire se il trigger Power Automate riceve chiamate da GitHub Pages.</p>
  <p><strong>Uso:</strong> caricalo su GitHub, aprilo da GitHub Pages e clicca uno dei due pulsanti. Poi controlla la cronologia esecuzioni del flow.</p>
  <button id="fetchBtn" type="button">Invia test con fetch</button>
  <button id="beaconBtn" type="button">Invia test con sendBeacon</button>
  <pre id="log">Pronto.</pre>
</main>
<script>
const POWER_AUTOMATE_URL = "https://f64e537a8be94b0ab6d276748c9434.85.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/03d33ad1f3a94dbea94c69a4b171b1de/triggers/manual/paths/invoke?api-version=1";

function buildPayload(methodName){
  const submittedAt = new Date().toISOString();
  const submissionId = "TEST-" + Date.now();
  return {
    meta: {
      schema_version: "TEST-DIRETTO-POWER-AUTOMATE",
      build_check: "TEST-DIRETTO-2026-07-02",
      submission_id: submissionId,
      submitted_at: submittedAt,
      source: "github-pages-test-file",
      send_method: methodName
    },
    participant: {
      name: "Test Diretto",
      email: "test@test.it",
      store: "Store Test"
    },
    final_reflection: {
      takeaway: "Test invio diretto da GitHub Pages",
      support_need: "",
      best_practice: ""
    },
    sharepoint_rows: [
      {
        Title: "Test Diretto - G01",
        SubmissionId: submissionId,
        SubmittedAt: submittedAt,
        ParticipantName: "Test Diretto",
        ParticipantEmail: "test@test.it",
        StoreName: "Store Test",
        ExerciseId: "G01",
        ExerciseTitle: "Test diretto Power Automate",
        HatRed: "test rosso",
        HatWhite: "test bianco",
        HatBlack: "test nero",
        HatGreen: "test verde",
        HatYellow: "test giallo",
        HatBlue: "test blu",
        FinalTakeaway: "Test invio diretto da GitHub Pages",
        SupportNeed: "",
        BestPractice: ""
      }
    ]
  };
}

function log(message){
  document.getElementById("log").textContent = message;
}

document.getElementById("fetchBtn").addEventListener("click", async () => {
  const payload = buildPayload("fetch-no-cors");
  log("Invio con fetch in corso...\n\n" + JSON.stringify(payload, null, 2));
  try {
    await fetch(POWER_AUTOMATE_URL, {
      method: "POST",
      mode: "no-cors",
      cache: "no-store",
      headers: { "Content-Type": "text/plain;charset=UTF-8" },
      body: JSON.stringify(payload)
    });
    log("Richiesta fetch inviata. Ora controlla Power Automate > Cronologia esecuzioni.\n\n" + JSON.stringify(payload, null, 2));
  } catch (err) {
    log("Errore fetch visibile nel browser:\n" + String(err));
  }
});

document.getElementById("beaconBtn").addEventListener("click", () => {
  const payload = buildPayload("sendBeacon");
  const blob = new Blob([JSON.stringify(payload)], { type: "text/plain;charset=UTF-8" });
  const ok = navigator.sendBeacon(POWER_AUTOMATE_URL, blob);
  log((ok ? "sendBeacon accettato dal browser." : "sendBeacon NON accettato dal browser.") + "\nOra controlla Power Automate > Cronologia esecuzioni.\n\n" + JSON.stringify(payload, null, 2));
});
</script>
</body>
</html>
